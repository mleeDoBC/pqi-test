<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PQI Connect | Coach Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 24px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        #caspio-container { position: absolute; left: -9999px; top: -9999px; visibility: hidden; }
        .field-label { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.15em; color: #94a3b8; margin-bottom: 4px; }
        .field-value { font-size: 13px; font-weight: 600; color: #1e293b; line-height: 1.6; }
        .field-block { padding: 16px; background: #f8fafc; border-radius: 16px; border: 1px solid #f1f5f9; }
        .tag { display: inline-block; padding: 4px 12px; border-radius: 99px; font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; background: #eff6ff; color: #3b82f6; border: 1px solid #bfdbfe; }
        .avatar-placeholder { width: 80px; height: 80px; border-radius: 24px; background: linear-gradient(135deg, #1e293b, #334155); display: flex; align-items: center; justify-content: center; font-weight: 900; font-style: italic; color: white; font-size: 22px; flex-shrink: 0; }
        .avatar-img { width: 80px; height: 80px; border-radius: 24px; object-fit: cover; flex-shrink: 0; }
        .spinner { display: flex; align-items: center; justify-content: center; padding: 60px; color: #94a3b8; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; gap: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div id="caspio-container"></div>
    <div class="max-w-2xl mx-auto px-4 py-10 fade-in">
        <div class="mb-8 flex items-center justify-between">
            <button onclick="goBack()" class="flex items-center gap-2 text-[10px] font-black text-slate-400 uppercase tracking-widest hover:text-blue-600 transition">
                <i class="fas fa-arrow-left"></i> All Coaches
            </button>
            <div class="flex items-center gap-3 italic font-black text-lg uppercase tracking-tighter text-slate-800">
                <i class="fas fa-handshake-angle text-blue-500"></i>
                PQI <span class="text-blue-500">CONNECT</span>
            </div>
        </div>

        <section class="glass-card p-8 lg:p-10">
            <!-- Hero -->
            <div class="flex items-start gap-6 mb-8 pb-8 border-b border-slate-100" id="profile-hero">
                <div class="spinner"><i class="fas fa-spinner fa-spin"></i></div>
            </div>
            <!-- Details -->
            <div id="profile-details">
            </div>
            <!-- Request Button -->
            <div class="mt-8 pt-8 border-t border-slate-100">
                <button onclick="sendRequest()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-[11px] uppercase tracking-[0.3em] shadow-xl hover:bg-blue-600 transition">
                    <i class="fas fa-paper-plane mr-2"></i> Send Coaching Request
                </button>
                <p class="text-center text-[10px] text-slate-400 mt-3 font-medium">The coach will review your application and respond within 5 business days.</p>
            </div>
        </section>
    </div>

<script>
    const params = new URLSearchParams(window.location.search);
    const coachUid = params.get('coach_uid') || '';
    const myUid    = params.get('uid') || sessionStorage.getItem('uid') || '';
    const myName   = params.get('name') || sessionStorage.getItem('name') || '';

    function goBack() {
        window.location.href = 'coach_list.html?uid=' + encodeURIComponent(myUid) + '&name=' + encodeURIComponent(myName);
    }

    function getCellText(cell) {
        const span = cell.querySelector('span');
        if (span) span.remove();
        return cell.textContent.trim();
    }

    function loadCoach() {
        if (!coachUid) return;
        const container = document.getElementById('caspio-container');
        const s = document.createElement('script');
        s.type = 'text/javascript';
        s.src = 'https://c0abr823.caspio.com/dp/1c9f500083782a08fdf648519de1/emb?uid=' + encodeURIComponent(coachUid);
        container.appendChild(s);
        waitForCoach(0);
    }

    function waitForCoach(tries) {
        const table = document.querySelector('#caspio-container table');
        if (table) {
            const rows = table.querySelectorAll('tr');
            let profile = null;
            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                if (cells.length >= 9) {
                    profile = {
                        profileImage:  getCellText(cells[0]),
                        firstName:     getCellText(cells[1]),
                        lastName:      getCellText(cells[2]),
                        practice:      getCellText(cells[3]),
                        qiStrengths:   getCellText(cells[4]),
                        about:         getCellText(cells[5]),
                        coachingStyle: getCellText(cells[6]),
                        additional:    getCellText(cells[7]),
                        bookingLink:   getCellText(cells[8]),
                        email:         getCellText(cells[9])
                    };
                }
            });
            if (profile) renderProfile(profile);
            else document.getElementById('profile-hero').innerHTML = '<p class="text-slate-400 text-xs italic">Profile not found.</p>';
        } else if (tries < 40) {
            setTimeout(() => waitForCoach(tries + 1), 300);
        } else {
            document.getElementById('profile-hero').innerHTML = '<p class="text-slate-400 text-xs italic">Could not load profile.</p>';
        }
    }

    function renderProfile(p) {
        const initials = (((p.firstName||'')[0]||'') + ((p.lastName||'')[0]||'')).toUpperCase();
        const avatarHtml = p.profileImage
            ? '<img src="'+p.profileImage+'" class="avatar-img" onerror="this.outerHTML=\'<div class=&quot;avatar-placeholder&quot;>'+initials+'</div>\'">'
            : '<div class="avatar-placeholder">'+initials+'</div>';

        document.getElementById('profile-hero').innerHTML =
            avatarHtml +
            '<div class="flex-1"><span class="text-[9px] font-black text-blue-600 uppercase tracking-widest">PQI Coach</span>' +
            '<h2 class="text-2xl font-black italic text-slate-900 uppercase leading-tight mt-1">Dr. '+p.firstName+' '+p.lastName+'</h2>' +
            (p.practice ? '<p class="text-xs font-bold text-slate-400 italic mt-1">'+p.practice+'</p>' : '') +
            (p.email ? '<p class="text-xs text-slate-400 mt-2"><i class="fas fa-envelope mr-1"></i>'+p.email+'</p>' : '') +
            '</div>';

        const tags = p.qiStrengths ? p.qiStrengths.split(',').map(t => '<span class="tag">'+t.trim()+'</span>').join('') : '';

        document.getElementById('profile-details').innerHTML =
            (p.about ? '<div class="mb-6"><div class="field-label mb-2">About</div><div class="field-block"><div class="field-value">'+p.about+'</div></div></div>' : '') +
            (tags ? '<div class="mb-6"><div class="field-label mb-2">QI Strengths</div><div class="flex flex-wrap gap-2">'+tags+'</div></div>' : '') +
            (p.coachingStyle ? '<div class="mb-6"><div class="field-block"><div class="field-label">Coaching Style</div><div class="field-value">'+p.coachingStyle+'</div></div></div>' : '') +
            (p.additional ? '<div class="mb-6"><div class="field-block"><div class="field-label">Additional Info</div><div class="field-value">'+p.additional+'</div></div></div>' : '') +
            (p.bookingLink ? '<div class="mb-2"><div class="field-block"><div class="field-label">Booking</div><div class="field-value"><a href="'+p.bookingLink+'" target="_blank" class="text-blue-600 hover:underline">'+p.bookingLink+'</a></div></div></div>' : '');
    }

    function sendRequest() {
        alert('Request sent! The coach will review your application and get back to you within 5 business days.');
        window.location.href = 'coachee.html?uid=' + encodeURIComponent(myUid) + '&name=' + encodeURIComponent(myName);
    }

    loadCoach();
</script>
</body>
</html>
