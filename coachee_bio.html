<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COACH Connect | Edit Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .sidebar-gradient { background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%); }
        .accent-text { font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.6rem; }

        .form-input { width: 100%; border: 1.5px solid #e2e8f0; border-radius: 12px; padding: 12px 16px; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s; resize: none; color: #1e293b; background: white; }
        .form-input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
        .form-input.error { border-color: #ef4444; }

        .btn-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; border: none; border-radius: 12px; padding: 14px 32px; font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.15em; cursor: pointer; transition: all 0.2s ease; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(99,102,241,0.3); }
        .btn-secondary { background: transparent; color: #64748b; border: 1.5px solid #e2e8f0; border-radius: 12px; padding: 14px 24px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s ease; }
        .btn-secondary:hover { border-color: #94a3b8; color: #334155; }

        .char-count { font-size: 11px; color: #94a3b8; text-align: right; margin-top: 4px; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (min-width: 1024px) { body { overflow: hidden; } }
    </style>
</head>
<body class="antialiased text-slate-800">

<div class="flex flex-col lg:flex-row min-h-screen">
    <aside class="w-full lg:w-80 sidebar-gradient text-slate-400 flex flex-col shadow-2xl z-50 lg:h-screen lg:sticky lg:top-0">
        <div class="p-8 pb-6">
            <div class="flex items-center gap-3 italic font-black text-2xl uppercase tracking-tighter text-white">
                <i class="fas fa-handshake-angle text-indigo-400"></i>
                <span>COACH <span class="text-indigo-400">CONNECT</span></span>
            </div>
        </div>

        <div class="px-6 mb-8 flex-1">
            <div class="bg-white/5 border border-white/10 rounded-3xl p-5 mb-8">
                <div class="flex items-center gap-4">
                    <div class="h-12 w-12 rounded-2xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white font-black italic text-lg" id="sidebar-initials">CO</div>
                    <div>
                        <h4 class="text-sm font-black italic text-white leading-none uppercase" id="sidebar-name">Coachee</h4>
                        <p class="text-[8px] font-black text-indigo-400 mt-1.5 uppercase tracking-widest opacity-80">Physician Coachee</p>
                    </div>
                </div>
            </div>
            
            <a href="#" id="back-to-dashboard" class="flex items-center gap-3 text-xs font-black text-slate-400 uppercase tracking-wider hover:text-white transition-colors group">
                <div class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center group-hover:bg-indigo-500 transition-colors">
                    <i class="fas fa-arrow-left"></i>
                </div>
                Back to Dashboard
            </a>
        </div>
    </aside>

    <main class="flex-1 bg-[#f8fafc] lg:h-screen lg:overflow-y-auto">
        <div class="max-w-2xl mx-auto px-6 py-12 fade-in">
            <div class="mb-10">
                <p class="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-2">Profile Management</p>
                <h1 class="text-3xl font-black text-slate-900 leading-tight">Edit Your Profile</h1>
                <p class="text-slate-500 text-sm mt-2">Update your contact and background information.</p>
            </div>

            <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
                <div class="space-y-6">
                    <div>
                        <label class="block text-xs font-black text-slate-700 uppercase tracking-wider mb-2">Phone</label>
                        <input type="tel" class="form-input" id="phone" placeholder="604-555-0000">
                    </div>
                    <div>
                        <label class="block text-xs font-black text-slate-700 uppercase tracking-wider mb-2">Site / Community</label>
                        <input type="text" class="form-input" id="site" placeholder="e.g. St. Paul's Hospital, Vancouver">
                    </div>
                    <div>
                        <label class="block text-xs font-black text-slate-700 uppercase tracking-wider mb-2">Role & Specialty</label>
                        <input type="text" class="form-input" id="role-specialty" placeholder="e.g. Family Physician, General Practice">
                    </div>
                    <div>
                        <label class="block text-xs font-black text-slate-700 uppercase tracking-wider mb-2">About You</label>
                        <textarea class="form-input" id="about" rows="6" maxlength="1000" oninput="updateChar('about', 'count-about')"></textarea>
                        <p class="char-count"><span id="count-about">0</span>/1000</p>
                    </div>
                </div>
                <div class="flex justify-end gap-3 mt-10 pt-6 border-t border-slate-100">
                    <button class="btn-secondary" id="cancel-btn">Cancel</button>
                    <button class="btn-primary" onclick="saveProfile()" id="save-btn">Save Changes <i class="fas fa-save ml-2"></i></button>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Hidden Caspio Update DataPage -->
<div id="caspio-update-profile" style="position:absolute;left:-9999px;top:-9999px;">
    <script type="text/javascript" src="https://c0abr823.caspio.com/dp/1c9f5000666821a73a7f4249af67/emb"></script>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const coacheeName = urlParams.get('name');
    const uid = urlParams.get('uid');

    if (coacheeName) {
        document.getElementById('sidebar-name').textContent = coacheeName;
        const parts = coacheeName.trim().split(' ');
        const initials = parts.map(p => p[0]).join('').toUpperCase().slice(0, 2);
        document.getElementById('sidebar-initials').textContent = initials;
    }

    const dashboardUrl = `coachee.html?uid=${encodeURIComponent(uid || '')}&name=${encodeURIComponent(coacheeName || '')}`;
    document.getElementById('back-to-dashboard').href = dashboardUrl;
    document.getElementById('cancel-btn').onclick = () => window.location.href = dashboardUrl;

    function updateChar(fieldId, countId) {
        document.getElementById(countId).textContent = document.getElementById(fieldId).value.length;
    }

    // 1. 읽어오기 (완벽한 고정 ID 매핑)
    function loadExistingData(tries) {
        // Caspio 폼이 완전히 렌더링되었는지 확인하는 가장 확실한 기준은 저장 버튼의 존재 여부입니다.
        const caspioUpdateBtn = document.querySelector('.cbUpdateButton');
        const caspioAbout = document.getElementById('EditRecordAbout');
    
        if (caspioUpdateBtn && caspioAbout) {
            const phoneField = document.getElementById('EditRecordPhone');
            const siteField  = document.getElementById('EditRecordSite');
            const roleField  = document.getElementById('EditRecordRole_Specialty');
    
            // 값 세팅 (Caspio에 해당 필드가 없더라도 에러가 나지 않도록 방어 코드 적용)
            document.getElementById('phone').value = phoneField ? phoneField.value : '';
            document.getElementById('site').value = siteField ? siteField.value : '';
            document.getElementById('role-specialty').value = roleField ? roleField.value : '';
            document.getElementById('about').value = caspioAbout.value;
    
            updateChar('about', 'count-about');
            
            // 기존 Caspio 버튼 숨기기
            caspioUpdateBtn.style.display = 'none';
        } else if (tries < 50) { // 재시도 횟수와 간격을 늘려 안정성 확보
            setTimeout(() => loadExistingData(tries + 1), 300);
        }
    }
    loadExistingData(0);

    // 2. 안전한 값 덮어쓰기 헬퍼 함수 (Caspio 내부 로직 충돌 방지)
    function setCaspioValue(id, value) {
        const el = document.getElementById(id);
        if (el) {
            el.value = value;
            el.dispatchEvent(new Event('change', { bubbles: true })); // Caspio가 변경을 감지하도록 강제
        }
    }

    // 3. 저장하기 (고정 ID 역매핑)
    function saveProfile() {
        const saveBtn = document.getElementById('save-btn');
        saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Saving...';
        saveBtn.disabled = true;
    
        const caspioUpdateBtn = document.querySelector('.cbUpdateButton');
        if (caspioUpdateBtn) {
            // 커스텀 폼의 값을 읽어와서 Caspio 숨김 폼으로 전송
            setCaspioValue('EditRecordPhone', document.getElementById('phone').value.trim());
            setCaspioValue('EditRecordSite', document.getElementById('site').value.trim());
            setCaspioValue('EditRecordRole_Specialty', document.getElementById('role-specialty').value.trim());
            setCaspioValue('EditRecordAbout', document.getElementById('about').value.trim());

            // 전송 버튼 클릭
            caspioUpdateBtn.click();
            
            // 성공 후 돌아가기
            setTimeout(() => { window.location.href = dashboardUrl; }, 1200);
        } else {
            alert('오류: Caspio 폼을 찾을 수 없습니다.');
            saveBtn.innerHTML = 'Save Changes <i class="fas fa-save ml-2"></i>';
            saveBtn.disabled = false;
        }
    }
</script>
</body>
</html>
