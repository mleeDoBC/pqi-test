<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Connect | Coach Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        .glass-card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 24px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); }
        .sidebar-gradient { background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%); }
        .nav-item { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        .nav-item.active { background: rgba(59, 130, 246, 0.1); border-left: 4px solid #3b82f6; color: white; }
        .nav-item.active i { color: #60a5fa; }
        .nav-item:not(.active):hover { background: rgba(255, 255, 255, 0.03); color: #cbd5e1; }
        .accent-text { font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.6rem; }
        .neon-dot { width: 6px; height: 6px; background-color: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981; }
        
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (min-width: 1024px) {
            body { overflow: hidden; }
            .main-content-height { height: 100vh; }
        }
    </style>
</head>
<body class="antialiased text-slate-800">

    <div id="caspio-matches" style="position:absolute;left:-9999px;top:-9999px;visibility:hidden;"></div>

    <div class="flex flex-col lg:flex-row min-h-screen">
        <aside class="w-full lg:w-80 sidebar-gradient text-slate-400 flex flex-col shadow-2xl z-50 lg:h-screen">
            <div class="p-6 lg:p-8 lg:pb-12 flex justify-between items-center lg:block">
                <div class="flex items-center gap-3 italic font-black text-2xl uppercase tracking-tighter text-white cursor-pointer" onclick="location.reload()">
                    <i class="fas fa-handshake-angle text-blue-500"></i>
                    <span>COACH <span class="text-blue-500">CONNECT</span></span>
                </div>
                <button class="lg:hidden text-white text-xl"><i class="fas fa-bars"></i></button>
            </div>

            <div class="hidden lg:block px-6 mb-10">
                <div class="bg-white/5 border border-white/10 rounded-3xl p-5 relative overflow-hidden group">
                    <div class="absolute top-0 right-0 p-3"><div class="neon-dot"></div></div>
                    <div class="flex items-center gap-4">
                        <div class="h-12 w-12 rounded-2xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white font-black italic" id="avatar-initials">MC</div>
                        <div>
                            <h4 class="text-sm font-black italic text-white leading-none uppercase" id="coach-name">Dr. Michael Cho</h4>
                            <a href="#" onclick="viewProfile()" class="text-[8px] font-black text-blue-400 mt-1.5 uppercase tracking-widest opacity-80 hover:opacity-100 transition-opacity">View Profile →</a>
                        </div>
                    </div>
                </div>
            </div>

            <nav class="hidden lg:flex flex-1 px-4 space-y-2 flex-col">
                <span class="px-4 accent-text text-slate-600 block mb-4">Management</span>
                <a href="#" class="nav-item active flex items-center gap-4 px-6 py-4 rounded-2xl group" id="nav-dashboard" onclick="location.reload()">
                    <i class="fas fa-grid-2 text-sm transition-transform group-hover:scale-110"></i>
                    <span class="text-[11px] font-black uppercase tracking-[0.2em] italic">Dashboard</span>
                </a>
                <a href="#" class="nav-item flex items-center gap-4 px-6 py-4 rounded-2xl group" id="nav-portfolio" onclick="showPortfolioList()">
                    <i class="fas fa-briefcase text-sm"></i> 
                    <span class="text-[11px] font-black uppercase tracking-[0.2em] italic">Portfolio</span>
                    <span class="ml-auto bg-white/10 text-white text-[9px] px-2 py-0.5 rounded-lg font-black">6</span>
                </a>
                <a href="#" class="nav-item flex items-center gap-4 px-6 py-4 rounded-2xl group" id="nav-invoices" onclick="showInvoiceList()">
                    <i class="fas fa-file-invoice-dollar text-sm"></i>
                    <span class="text-[11px] font-black uppercase tracking-[0.2em] italic">Invoices</span>
                </a>
            </nav>

            <div class="hidden lg:flex p-8 border-t border-white/5 bg-black/20 mt-auto">
                <div class="flex items-center justify-between px-2 w-full">
                    <div class="flex flex-col text-[9px] font-black text-slate-500 uppercase">Matching <span class="text-emerald-400 italic text-[10px]">Available</span></div>
                    <button class="w-10 h-5 bg-emerald-500/20 border border-emerald-500/50 rounded-full relative p-1">
                        <div class="absolute right-1 top-1 w-2.5 h-2.5 bg-emerald-400 rounded-full shadow-[0_0_8px_#10b981]"></div>
                    </button>
                </div>
            </div>
        </aside>

        <main id="main-content" class="flex-1 bg-[#f8fafc] p-6 lg:p-10 fade-in lg:overflow-y-auto main-content-height">
            <div id="dashboard-view">
                <header class="flex justify-between items-center mb-8 lg:mb-12">
                    <div>
                        <h1 class="text-2xl lg:text-3xl font-black italic text-slate-900 tracking-tighter uppercase leading-tight">Coach Dashboard</h1>
                        <div class="h-1 w-12 bg-blue-600 mt-2"></div>
                    </div>
                </header>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 lg:gap-8 mb-10 lg:mb-12">
                    <div class="glass-card p-6 lg:p-8 group hover:border-blue-500 transition-all cursor-pointer">
                        <span class="accent-text text-blue-600 block mb-2">Logged Hours</span>
                        <div class="flex items-end gap-2"><span class="text-3xl lg:text-4xl font-black italic text-slate-900 leading-none">12.5</span><span class="text-sm font-bold text-slate-300 mb-1">/ 20.0</span></div>
                        <div class="w-full bg-slate-100 h-1.5 rounded-full mt-6 overflow-hidden"><div class="bg-blue-600 h-full w-[62%]"></div></div>
                    </div>
                    <div class="glass-card p-6 lg:p-8 group hover:border-emerald-500 transition-all cursor-pointer" onclick="showInvoiceList()">
                        <span class="accent-text text-emerald-600 block mb-2">Pending Invoices</span>
                        <div class="flex items-center justify-between"><span class="text-3xl lg:text-4xl font-black italic text-slate-900 leading-none">$1,875</span></div>
                    </div>
                    <div class="glass-card p-6 lg:p-8 bg-slate-900 border-none cursor-pointer hover:ring-2 hover:ring-blue-500 transition-all" onclick="window.location.href='mailto:support@coachconnect.com'">
                        <span class="accent-text text-blue-400 block mb-2 tracking-[0.2em]">Support</span>
                        <p class="text-white text-sm font-black italic mb-4 uppercase leading-tight">Need Admin Help?</p>
                        <button class="w-full bg-blue-600 text-white py-3 rounded-xl font-black text-[9px] uppercase tracking-widest shadow-lg">Contact Staff</button>
                    </div>
                </div>

                <section class="glass-card p-6 lg:p-8">
                    <h3 class="text-sm font-black italic uppercase tracking-widest text-slate-900 mb-6 lg:mb-8">Active Portfolio</h3>
                    <div class="space-y-4" id="coachee-list">
                        <div class="text-center py-8 text-slate-400 text-xs font-bold uppercase tracking-widest" id="coachee-loading">
                            <i class="fas fa-spinner fa-spin mr-2"></i>Loading...
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script>
    function showCoacheeDetail(coacheeId, matchId) {
        const project = window.cachedMatches.find(m => m.matchId === matchId);
        if (!project) return;
        
        const isPending = (project.status === 'Pending' || project.status === 'Applied');
        const name = project.coacheeFirst ? 'Dr. ' + project.coacheeFirst + ' ' + project.coacheeLast : project.coacheeId;
        const initials = project.coacheeFirst ? (project.coacheeFirst[0] + (project.coacheeLast ? project.coacheeLast[0] : '')).toUpperCase() : project.coacheeId.slice(0,2).toUpperCase();
        const mainContent = document.getElementById('main-content');
        
        const currentUid = uid || sessionStorage.getItem('uid');
        const currentName = coachName || sessionStorage.getItem('name') || '';
        
        const meetingUrl = 'meeting.html?match_id=' + encodeURIComponent(project.matchId)
            + '&coachee_uid=' + encodeURIComponent(project.coacheeId)
            + '&coach_uid=' + encodeURIComponent(currentUid)
            + '&name=' + encodeURIComponent(currentName)
            + '&coachee_name=' + encodeURIComponent(project.coacheeFirst + ' ' + project.coacheeLast)
            + '&project_title=' + encodeURIComponent(project.projectTitle || '')
            + '&problem=' + encodeURIComponent(project.problem || '')
            + '&about=' + encodeURIComponent(project.about || '');
        
        const detailView = `
            <div class="fade-in">
                <div class="flex flex-col lg:flex-row justify-between lg:items-center mb-10 gap-4">
                    <button onclick="location.reload()" class="w-fit flex items-center gap-2 text-[10px] font-black text-slate-400 uppercase tracking-widest hover:text-blue-600 transition">
                        <i class="fas fa-arrow-left"></i> Back to Dashboard
                    </button>
                    <div>
                        <span class="accent-text text-blue-600 tracking-widest block lg:text-right">Project Workspace</span>
                        <h1 class="text-2xl font-black italic text-slate-900 uppercase leading-none mt-1 lg:text-right">${project.projectTitle || 'Workspace'}</h1>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                    
                    <div class="lg:col-span-8 space-y-6">
                        
                        <div class="glass-card p-8">
                            <span class="accent-text text-blue-600 tracking-widest block mb-6">Project Context & Problems</span>
                            <div class="space-y-6">
                                <div>
                                    <h4 class="text-[10px] font-black text-slate-400 uppercase italic mb-2 tracking-tighter">Primary Problem Statement</h4>
                                    <p class="text-sm text-slate-700 font-medium leading-relaxed border-l-4 border-blue-600 pl-4 py-1 italic">
                                        "${project.problem || 'No problem statement provided.'}"
                                    </p>
                                </div>
                                <div>
                                    <h4 class="text-[10px] font-black text-slate-400 uppercase italic mb-2 tracking-tighter">Current Situation</h4>
                                    <p class="text-sm text-slate-700 leading-relaxed font-medium bg-slate-50/50 p-4 rounded-2xl border border-slate-100">
                                        ${project.appSituation || 'No situation description provided.'}
                                    </p>
                                </div>
                                <div>
                                    <h4 class="text-[10px] font-black text-slate-400 uppercase italic mb-2 tracking-tighter">About the Coachee / Support Needed</h4>
                                    <p class="text-sm text-slate-700 leading-relaxed font-medium bg-slate-50/50 p-4 rounded-2xl border border-slate-100">
                                        ${project.about || 'No details provided.'}
                                        ${project.appSupport ? `<br><br><span class="font-bold text-slate-800">Support Needed:</span> ${project.appSupport}` : ''}
                                    </p>
                                </div>
                            </div>
                        </div>

                        <div class="glass-card p-8">
                            <span class="accent-text text-slate-400 tracking-widest block mb-6">Application Specifications</span>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="p-4 bg-slate-50 border border-slate-100 rounded-2xl">
                                    <p class="text-[9px] font-black text-slate-400 uppercase leading-none mb-1.5">Region / Location</p>
                                    <p class="text-xs font-black text-slate-900 uppercase italic">${project.appRegion || 'N/A'}</p>
                                </div>
                                <div class="p-4 bg-slate-50 border border-slate-100 rounded-2xl">
                                    <p class="text-[9px] font-black text-slate-400 uppercase leading-none mb-1.5">Physician Lead</p>
                                    <p class="text-xs font-black text-slate-900 uppercase italic">${project.appPhysician || 'None Specified'}</p>
                                </div>
                                <div class="p-4 bg-slate-50 border border-slate-100 rounded-2xl">
                                    <p class="text-[9px] font-black text-slate-400 uppercase leading-none mb-1.5">QI Level & Training</p>
                                    <p class="text-xs font-black text-slate-900 uppercase italic">${project.appQILevel || 'No Prior Level'} (${project.appQITraining || 'No formal training'})</p>
                                </div>
                                <div class="p-4 bg-slate-50 border border-slate-100 rounded-2xl">
                                    <p class="text-[9px] font-black text-slate-400 uppercase leading-none mb-1.5">Project Timeline</p>
                                    <p class="text-xs font-black text-slate-900 uppercase italic">${project.appStartDate || 'TBD'} ~ ${project.appEndDate || 'TBD'}</p>
                                </div>
                                
                                <div class="p-4 bg-slate-50 border border-slate-100 rounded-2xl">
                                    <p class="text-[9px] font-black text-slate-400 uppercase leading-none mb-1.5">Funding Details</p>
                                    <p class="text-xs font-black text-slate-900 uppercase italic">${project.appFunding || 'None'}</p>
                                </div>
                                <div class="p-4 bg-slate-50 border border-slate-100 rounded-2xl">
                                    <p class="text-[9px] font-black text-slate-400 uppercase leading-none mb-1.5">Ideal Coach Profile</p>
                                    <p class="text-xs font-black text-slate-900 uppercase italic">${project.appCoachLooking || 'Any Coach'}</p>
                                </div>
                                <div class="p-4 bg-slate-50 border border-slate-100 rounded-2xl md:col-span-2">
                                    <p class="text-[9px] font-black text-slate-400 uppercase leading-none mb-1.5">Availability & Meeting Preference</p>
                                    <p class="text-xs font-black text-slate-900 uppercase italic">${project.appAvailability || 'Flexible'} / ${project.appFrequency || 'TBD'} via ${project.appMethod || 'Virtual'}</p>
                                </div>
                                ${project.appAdditional ? `
                                <div class="p-4 bg-slate-50 border border-slate-100 rounded-2xl md:col-span-2">
                                    <p class="text-[9px] font-black text-slate-400 uppercase leading-none mb-1.5">Additional Information</p>
                                    <p class="text-xs font-black text-slate-900 uppercase italic whitespace-pre-wrap">${project.appAdditional}</p>
                                </div>` : ''}
                            </div>
                        </div>
                    </div>

                    <div class="lg:col-span-4 space-y-6">
                        <div class="glass-card p-6 border-2 ${isPending ? 'border-amber-300' : 'border-blue-600'}">
                            <div class="flex justify-between items-center mb-6">
                                <span class="accent-text text-slate-400 tracking-widest block">Assigned Coachee</span>
                                ${isPending 
                                    ? '<span class="text-[8px] font-black text-amber-500 bg-amber-50 px-2 py-0.5 rounded uppercase border border-amber-200">Pending Approval</span>'
                                    : '<span class="text-[8px] font-black text-emerald-500 bg-emerald-50 px-2 py-0.5 rounded uppercase border border-emerald-200">Active</span>'
                                }
                            </div>

                            <div class="flex items-center gap-4 mb-6">
                                <div class="w-16 h-16 rounded-2xl bg-blue-600 flex items-center justify-center text-white font-black italic text-xl shadow-sm tracking-tighter">${initials}</div>
                                <div>
                                    <h3 class="text-sm font-black italic text-slate-900 uppercase">${name}</h3>
                                </div>
                            </div>

                             ${isPending 
                                ? `
                                   <div class="bg-amber-50 border border-amber-100 rounded-2xl p-4 text-center mb-4">
                                       <p class="text-[10px] font-black text-amber-600 uppercase tracking-wide leading-relaxed mb-3">
                                           This is a new application.
                                       </p>
                                       <button onclick="acceptProject('${project.matchId}')" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-lg hover:bg-emerald-500 transition">
                                           <i class="fas fa-check mr-1.5"></i> Accept Application
                                       </button>
                                   </div>`
                                : `
                                   <button onclick="window.location.href='${meetingUrl}'" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-lg hover:bg-blue-500 transition mb-4">
                                       <i class="fas fa-video mr-1.5"></i> Enter Workspace
                                   </button>`
                            }
                        </div>
                    </div>
                </div>
            </div>
        `;
        
        mainContent.innerHTML = detailView;
    }
        
    function acceptProject(matchId) {
        alert('Accept functionality will be implemented here for match: ' + matchId);
    }

    function showInvoiceList() {
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => item.classList.remove('active'));
        
        const invoiceNav = document.getElementById('nav-invoices');
        if (invoiceNav) invoiceNav.classList.add('active');

        const mainContent = document.getElementById('main-content');
        mainContent.innerHTML = `
            <div class="fade-in">
                <header class="flex justify-between items-center mb-12">
                    <div>
                        <h1 class="text-3xl font-black italic text-slate-900 tracking-tighter uppercase leading-tight">Invoice Management</h1>
                        <div class="h-1 w-12 bg-emerald-500 mt-2"></div>
                    </div>
                    <button onclick="showNewInvoiceForm()" class="bg-slate-900 text-white px-6 py-3 rounded-2xl font-black text-[10px] uppercase tracking-[0.2em] shadow-xl hover:bg-blue-600 transition">
                        + New Invoice
                    </button>
                </header>
                
                <section class="glass-card p-8">
                    <h3 class="text-sm font-black italic uppercase tracking-widest text-slate-900 mb-8">Billing History</h3>
                    <div class="space-y-4">
                        <div class="flex items-center justify-between p-6 rounded-[24px] bg-slate-50 border border-transparent hover:border-emerald-200 transition-all cursor-pointer">
                            <div class="flex items-center gap-6">
                                <div class="w-12 h-12 rounded-2xl bg-emerald-100 flex items-center justify-center text-emerald-600"><i class="fas fa-clock"></i></div>
                                <div>
                                    <h4 class="text-sm font-black italic text-slate-900 uppercase">INV-2026-004</h4>
                                    <p class="text-[10px] font-bold text-slate-400 italic mt-1 uppercase tracking-tight">Dr. Sarah Thompson</p>
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="text-md font-black italic text-slate-900">$250.00</p>
                                <span class="bg-amber-100 text-amber-700 text-[8px] font-black px-2 py-0.5 rounded uppercase mt-1">Pending Payment</span>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        `;
    }

    function showNewInvoiceForm() {
        const currentUid = uid || sessionStorage.getItem('uid') || '';
        const currentName = coachName || sessionStorage.getItem('name') || '';
        window.location.href = 'invoice.html?uid=' + encodeURIComponent(currentUid) + '&name=' + encodeURIComponent(currentName);
    }

    function showPortfolioList() {
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => item.classList.remove('active'));
        if (document.getElementById('nav-portfolio')) {
            document.getElementById('nav-portfolio').classList.add('active');
        }

        const mainContent = document.getElementById('main-content');

        const generateListHTML = (matches, type, emptyMsg) => {
            if (matches.length === 0) return `<p class="text-xs text-slate-400 font-bold uppercase tracking-widest py-4">${emptyMsg}</p>`;
            
            return matches.map(m => {
                const fullName = m.coacheeFirst ? 'Dr. ' + m.coacheeFirst + ' ' + m.coacheeLast : m.coacheeId;
                const projectTitle = m.projectTitle || 'Coaching Project';
                const initials = m.coacheeFirst ? (m.coacheeFirst[0] + (m.coacheeLast ? m.coacheeLast[0] : '')).toUpperCase() : m.coacheeId.slice(0,2).toUpperCase();
                
                if (type === 'pending') {
                    return `
                    <div class="flex items-center justify-between p-6 rounded-[24px] bg-emerald-50 border border-emerald-100 hover:border-emerald-500 transition-all cursor-pointer group">
                        <div class="flex items-center gap-6">
                            <div class="w-12 h-12 rounded-2xl bg-white shadow-sm flex items-center justify-center font-black italic text-emerald-600">${initials}</div>
                            <div>
                                <h4 class="text-sm font-black italic text-slate-900 uppercase">${fullName}</h4>
                                <p class="text-[9px] font-bold text-slate-400 italic mt-1 uppercase">${projectTitle}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="text-[8px] font-black text-emerald-700 bg-emerald-200/50 px-2 py-1 rounded uppercase">New</span>
                            <button onclick="showCoacheeDetail('${m.coacheeId}', '${m.matchId}')" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest hover:bg-blue-600 transition-all">Review</button>
                        </div>
                    </div>`;
                } else if (type === 'active') {
                    return `
                    <div onclick="showCoacheeDetail('${m.coacheeId}', '${m.matchId}')" class="flex items-center justify-between p-6 rounded-[24px] bg-white border border-slate-100 hover:border-blue-500 hover:shadow-xl transition-all cursor-pointer group">
                        <div class="flex items-center gap-6">
                            <div class="w-12 h-12 rounded-2xl bg-slate-50 flex items-center justify-center font-black italic text-blue-600">${initials}</div>
                            <div>
                                <h4 class="text-sm font-black italic text-slate-900 uppercase">${fullName}</h4>
                                <p class="text-[9px] font-bold text-slate-400 italic mt-1 uppercase">${projectTitle}</p>
                            </div>
                        </div>
                        <i class="fas fa-chevron-right text-slate-200 group-hover:text-blue-600 transition-all"></i>
                    </div>`;
                } else {
                    return `
                    <div class="flex items-center justify-between p-6 rounded-[24px] bg-slate-50 border border-transparent grayscale hover:grayscale-0 transition-all cursor-pointer group">
                        <div class="flex items-center gap-6">
                            <div class="w-12 h-12 rounded-2xl bg-white flex items-center justify-center font-black italic text-slate-300">${initials}</div>
                            <div>
                                <h4 class="text-sm font-black italic text-slate-900 uppercase">${fullName}</h4>
                                <p class="text-[9px] font-bold text-slate-400 italic mt-1 uppercase">${projectTitle}</p>
                            </div>
                        </div>
                        <span class="text-[8px] font-black text-slate-400 border border-slate-200 px-2 py-1 rounded uppercase group-hover:border-slate-400 transition-all">${m.status}</span>
                    </div>`;
                }
            }).join('');
        };

        mainContent.innerHTML = `
            <div class="fade-in">
                <header class="mb-12">
                    <h1 class="text-3xl font-black italic text-slate-900 tracking-tighter uppercase">Total Portfolio</h1>
                    <div class="h-1 w-12 bg-blue-600 mt-2"></div>
                </header>

                <section class="mb-12">
                    <h3 class="text-[10px] font-black italic uppercase tracking-[0.2em] text-emerald-500 mb-6 flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-emerald-500"></span> New Potential Matches
                    </h3>
                    <div class="space-y-4">
                        ${generateListHTML(pendingMatches, 'pending', 'No pending matches at the moment.')}
                    </div>
                </section>

                <section class="mb-12">
                    <h3 class="text-[10px] font-black italic uppercase tracking-[0.2em] text-blue-600 mb-6 flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-blue-600"></span> Active Projects
                    </h3>
                    <div class="space-y-4">
                        ${generateListHTML(activeMatches, 'active', 'No active projects.')}
                    </div>
                </section>

                <section>
                    <h3 class="text-[10px] font-black italic uppercase tracking-[0.2em] text-slate-400 mb-6">Past Projects</h3>
                    <div class="space-y-4 opacity-70">
                        ${generateListHTML(pastMatches, 'past', 'No archived projects yet.')}
                    </div>
                </section>
            </div>
        `;
    }
    
    const urlParams = new URLSearchParams(window.location.search);
    const coachName = urlParams.get('name');
    const uid = urlParams.get('uid');

    if (uid) sessionStorage.setItem('uid', uid);
    if (coachName) sessionStorage.setItem('name', coachName);

    if (coachName) {
        document.getElementById('coach-name').textContent = 'Dr. ' + coachName;
        const parts = coachName.trim().split(' ');
        const initials = parts.map(p => p[0]).join('').toUpperCase().slice(0, 2);
        document.getElementById('avatar-initials').textContent = initials;
    }

    function viewProfile() {
        const currentUid = uid || sessionStorage.getItem('uid') || '';
        const currentName = coachName || sessionStorage.getItem('name') || '';
        window.location.href = 'coach_bio.html?uid=' + encodeURIComponent(currentUid) + '&name=' + encodeURIComponent(currentName) + '&mode=edit';
    }

    window.cachedMatches = [];
    let activeMatches = [];
    let pendingMatches = []; 
    let pastMatches = []; 

    function loadMatches() {
        const currentUid = uid || sessionStorage.getItem('uid');
        if (!currentUid) { 
            showNoMatches(); 
            return; 
        }

        const container = document.getElementById('caspio-matches');
        container.innerHTML = ''; 

        const s = document.createElement('script');
        s.type = 'text/javascript';
        s.src = 'https://c0abr823.caspio.com/dp/1c9f5000779680124c1248afbd6f/emb?uid=' + encodeURIComponent(currentUid);
        
        container.appendChild(s);
        waitForMatches(0);
    }

    function waitForMatches(tries) {
        const table = document.querySelector('#caspio-matches table');
        const container = document.getElementById('caspio-matches');
        const noRecordsMsg = container ? container.querySelector('.cbResultSetRecordMessage') : null;

        if (table) {
            parseMatches(table); 
        } else if (noRecordsMsg && noRecordsMsg.textContent.includes('No records found')) {
            showNoMatches();
        } else if (tries < 40) {
            setTimeout(() => waitForMatches(tries + 1), 300);
        } else {
            showNoMatches();
        }
    }

    function getCellText(cell) {
        if (!cell) return '';
        const clone = cell.cloneNode(true);
        const labels = clone.querySelectorAll('.cbResultSetLabel, span[class*="Label"]');
        labels.forEach(l => l.remove());
        return clone.textContent.trim();
    }

    function parseMatches(table) {
        const headerCells = table.querySelectorAll('th');
        const colIndexMap = {}; 
        
        headerCells.forEach((th, index) => {
            const rawText = th.textContent || th.innerText;
            const cleanKey = rawText.toLowerCase().replace(/[^a-z0-9]/g, '');
            if(cleanKey) colIndexMap[cleanKey] = index;
        });

        const rows = table.querySelectorAll('tr[class*="cbResultSet"], tr'); 
        const rawMatches = [];
        
        const normalizedFieldMapping = {
            'matchid': 'matchId',
            'coachid': 'coachId',
            'coacheeid': 'coacheeId',
            'status': 'status',
            'firstname': 'coacheeFirst',
            'coacheefirstname': 'coacheeFirst', 
            'lastname': 'coacheeLast',
            'coacheelastname': 'coacheeLast',  
            'projecttitle': 'projectTitle',
            'coacheeapplicationprojecttitle': 'projectTitle', 
            'problem': 'problem',
            'coacheeapplicationproblem': 'problem',
            'about': 'about',
            'coacheeabout': 'about',
            'coacheeapplicationsituation': 'appSituation',
            'coacheeapplicationfunding': 'appFunding',
            'coacheeapplicationphysicianlead': 'appPhysician',
            'coacheeapplicationprojectregion': 'appRegion',
            'coacheeapplicationstartdate': 'appStartDate',
            'coacheeapplicationenddate': 'appEndDate',
            'coacheeapplicationcoachlookingfor': 'appCoachLooking',
            'coacheeapplicationsupportneeded': 'appSupport',
            'coacheeapplicationqitraining': 'appQITraining',
            'coacheeapplicationqilevel': 'appQILevel',
            'coacheeapplicationavailability': 'appAvailability',
            'coacheeapplicationmeetingfrequency': 'appFrequency',
            'coacheeapplicationmeetingmethod': 'appMethod',
            'coacheeapplicationadditionalinfo': 'appAdditional',
            'coacheeapplicationreferral': 'appReferral'
        };

        rows.forEach(row => {
            const cells = row.querySelectorAll('td');
            if (cells.length > 0) { 
                const matchData = {};
                
                cells.forEach((cell, index) => {
                    let cleanKey = "";
                    
                    const labelSpan = cell.querySelector('.cbResultSetLabel, span[class*="Label"]');
                    if (labelSpan) {
                        cleanKey = labelSpan.textContent.toLowerCase().replace(/[^a-z0-9]/g, '');
                    } else {
                        cleanKey = Object.keys(colIndexMap).find(k => colIndexMap[k] === index) || "";
                    }

                    if (cleanKey && normalizedFieldMapping[cleanKey]) {
                        matchData[normalizedFieldMapping[cleanKey]] = getCellText(cell);
                    }
                });

                if (Object.keys(matchData).length === 0 && cells.length >= 7) {
                    matchData.matchId = getCellText(cells[0]);
                    matchData.coachId = getCellText(cells[1]);
                    matchData.coacheeId = getCellText(cells[2]);
                    matchData.status = getCellText(cells[3]);
                    matchData.coacheeFirst = getCellText(cells[4]);
                    matchData.coacheeLast = getCellText(cells[5]);
                    matchData.projectTitle = getCellText(cells[6]);
                    matchData.problem = getCellText(cells[7]);
                    matchData.about = getCellText(cells[8]);
                }

                if (matchData.matchId || matchData.status) {
                    rawMatches.push(matchData);
                }
            }
        });
        
        window.cachedMatches = rawMatches;
        activeMatches = rawMatches.filter(m => m.status === 'Active');
        pendingMatches = rawMatches.filter(m => m.status === 'Pending' || m.status === 'Applied'); 
        pastMatches = rawMatches.filter(m => m.status === 'Completed' || m.status === 'Archived' || m.status === 'Inactive');

        renderMatchCards();
    }

    function renderMatchCards() {
        const list = document.getElementById('coachee-list');
        
        const dashboardData = [...pendingMatches, ...activeMatches];

        if (dashboardData.length === 0) { 
            showNoMatches(); 
            return; 
        }

        list.innerHTML = dashboardData.map(m => {
            const fullName = m.coacheeFirst ? 'Dr. ' + m.coacheeFirst + ' ' + m.coacheeLast : m.coacheeId;
            const projectTitle = m.projectTitle || 'Coaching Project';
            const initials = m.coacheeFirst ? (m.coacheeFirst[0] + (m.coacheeLast ? m.coacheeLast[0] : '')).toUpperCase() : m.coacheeId.slice(0,2).toUpperCase();
            
            const isPending = (m.status === 'Pending' || m.status === 'Applied');
            const badgeHtml = isPending ? `<span class="bg-emerald-100 text-emerald-700 text-[8px] font-black px-2 py-0.5 rounded uppercase">Pending</span>` : '';

            return `
                <div onclick="showCoacheeDetail('${m.coacheeId}', '${m.matchId}')"
                    class="flex items-center justify-between p-5 lg:p-6 rounded-[24px] lg:rounded-[32px] bg-slate-50/50 border border-transparent hover:border-slate-200 hover:bg-white hover:shadow-xl transition-all duration-300 cursor-pointer group">
                    <div class="flex items-center gap-4 lg:gap-6">
                        <div class="w-12 h-12 lg:w-14 lg:h-14 rounded-2xl bg-white shadow-sm flex items-center justify-center font-black italic text-slate-400 group-hover:text-blue-600">${initials}</div>
                        <div>
                            <div class="flex items-center gap-2">
                                <h4 class="text-sm lg:text-md font-black italic text-slate-900 uppercase">${fullName}</h4>
                                ${badgeHtml}
                            </div>
                            <p class="text-[9px] lg:text-[10px] font-bold text-slate-400 italic mt-1 uppercase tracking-tight leading-tight">${projectTitle}</p>
                        </div>
                    </div>
                    <i class="fas fa-chevron-right text-slate-200 group-hover:text-blue-600 group-hover:translate-x-1 transition-all"></i>
                </div>`;
        }).join('');
    }

    function showNoMatches() {
        const list = document.getElementById('coachee-list');
        list.innerHTML = '<p class="text-center py-8 text-slate-400 text-xs font-bold uppercase tracking-widest">No projects available.</p>';
    }

    loadMatches();

    </script>
</body>
</html>
