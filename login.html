<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PQI Connect | Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; }

        .glass-card { background: rgba(255,255,255,0.97); border-radius: 28px; box-shadow: 0 32px 80px rgba(0,0,0,0.4); animation: fadeUp 0.5s ease-out; }

        .form-input { width: 100%; border: 1.5px solid #e2e8f0; border-radius: 12px; padding: 13px 16px; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; transition: all 0.2s; color: #1e293b; background: white; }
        .form-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        .form-input::placeholder { color: #94a3b8; }
        .form-input.error { border-color: #ef4444; box-shadow: 0 0 0 3px rgba(239,68,68,0.1); }

        .btn-primary { width: 100%; background: linear-gradient(135deg, #3b82f6, #6366f1); color: white; border: none; border-radius: 12px; padding: 15px; font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.15em; cursor: pointer; transition: all 0.2s ease; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(99,102,241,0.4); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .input-icon { position: relative; }
        .input-icon i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 13px; }
        .input-icon .form-input { padding-left: 40px; }

        .error-msg { font-size: 11px; color: #ef4444; margin-top: 4px; display: none; }
        .error-msg.show { display: block; }

        .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
        .divider hr { flex: 1; border: none; border-top: 1px solid #e2e8f0; }
        .divider span { font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.1em; }

        .spinner { display: none; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex items-center justify-center px-4 py-12">

    <!-- Hidden Caspio Login DataPage -->
    <div style="position:absolute;left:-9999px;top:-9999px;">
        <iframe id="caspio-frame" name="Login_Page" title="Login_Page" src="https://c0abr823.caspio.com/dp/1c9f50003d8805c2354d42c1845f" style="width:500px;height:500px;border:none;"></iframe>
    </div>

    <div class="w-full max-w-md">

        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="flex items-center justify-center gap-3 italic font-black text-3xl uppercase tracking-tighter text-white mb-2">
                <i class="fas fa-handshake-angle text-blue-400"></i>
                <span>PQI <span class="text-blue-400">CONNECT</span></span>
            </div>
            <p class="text-slate-400 text-sm">Physician Quality Improvement Network</p>
        </div>

        <!-- Card -->
        <div class="glass-card p-8">
            <div class="mb-7">
                <h2 class="text-2xl font-black text-slate-900">Welcome back</h2>
                <p class="text-slate-500 text-sm mt-1">Sign in to your account</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-black text-slate-600 uppercase tracking-wider mb-2">Email</label>
                    <div class="input-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" class="form-input" id="ui-email" placeholder="you@doctorsofbc.ca" autocomplete="email">
                    </div>
                    <p class="error-msg" id="err-email">Please enter your email.</p>
                </div>

                <div>
                    <label class="block text-xs font-black text-slate-600 uppercase tracking-wider mb-2">Password</label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" class="form-input" id="ui-password" placeholder="Your password" autocomplete="current-password">
                    </div>
                    <p class="error-msg" id="err-password">Please enter your password.</p>
                </div>

                <div class="pt-2">
                    <button class="btn-primary" id="submit-btn" onclick="handleLogin()">
                        <span id="btn-text">Sign In</span>
                        <div class="spinner" id="btn-spinner"></div>
                    </button>
                    <p class="error-msg text-center mt-3" id="err-general" style="font-size:12px;"></p>
                </div>
            </div>

            <div class="divider">
                <hr><span>Don't have an account?</span><hr>
            </div>

            <div class="text-center">
                <a href="signup.html" class="text-xs font-black text-blue-500 uppercase tracking-wider hover:text-blue-700 transition-colors">Create Account</a>
            </div>
        </div>

        <p class="text-center text-slate-500 text-xs mt-6">
            For support, contact <a href="mailto:support@doctorsofbc.ca" class="text-blue-400 hover:text-blue-300">support@doctorsofbc.ca</a>
        </p>
    </div>

<script>
    function setLoading(on) {
        const btn = document.getElementById('submit-btn');
        document.getElementById('btn-text').style.display = on ? 'none' : 'block';
        document.getElementById('btn-spinner').style.display = on ? 'block' : 'none';
        btn.disabled = on;
    }

    function showError(id, show) {
        const el = document.getElementById(id);
        const input = document.getElementById(id.replace('err-', 'ui-'));
        el.classList.toggle('show', show);
        if (input) input.classList.toggle('error', show);
    }

    function clearErrors() {
        ['email', 'password'].forEach(f => showError('err-' + f, false));
        const g = document.getElementById('err-general');
        g.classList.remove('show');
        g.textContent = '';
    }

    function validate() {
        let valid = true;
        if (!document.getElementById('ui-email').value.trim()) { showError('err-email', true); valid = false; }
        if (!document.getElementById('ui-password').value) { showError('err-password', true); valid = false; }
        return valid;
    }

    // Listen for redirect message from Caspio iframe
    window.addEventListener('message', function(event) {
        if (event.data.type === 'CASPIO_REDIRECT') {
            window.location.href = event.data.url;
        } else if (event.data.type === 'CASPIO_LOGIN_ERROR') {
            setLoading(false);
            const err = document.getElementById('err-general');
            err.textContent = 'Invalid email or password. Please try again.';
            err.classList.add('show');
        }
    });

    function handleLogin() {
        clearErrors();
        if (!validate()) return;
        setLoading(true);

        const frame = document.getElementById('caspio-frame');
        const data = {
            type: 'CASPIO_LOGIN',
            email: document.getElementById('ui-email').value.trim(),
            password: document.getElementById('ui-password').value
        };

        setTimeout(function() {
            frame.contentWindow.postMessage(data, '*');
        }, 500);
    }

    ['ui-email', 'ui-password'].forEach(id => {
        document.getElementById(id).addEventListener('input', () => {
            showError('err-' + id.replace('ui-', ''), false);
        });
    });
</script>

</body>
</html>
