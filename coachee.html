<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Connect | Coachee Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        .glass-card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 24px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); }
        .sidebar-gradient { background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%); }
        .nav-item { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        .nav-item.active { background: rgba(59, 130, 246, 0.1); border-left: 4px solid #3b82f6; color: white; }
        .nav-item:not(.active):hover { background: rgba(255, 255, 255, 0.03); color: #cbd5e1; }
        .accent-text { font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.6rem; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        @media (min-width: 1024px) { body { overflow: hidden; } .main-content-height { height: 100vh; } }
    </style>
</head>
<body class="antialiased text-slate-800">
    <!-- Caspio Hidden Container -->
    <div id="caspio-matches" style="position:absolute;left:-9999px;top:-9999px;visibility:hidden;"></div>

    <div class="flex flex-col lg:flex-row min-h-screen">
        <!-- Sidebar -->
        <aside class="w-full lg:w-80 sidebar-gradient text-slate-400 flex flex-col shadow-2xl z-50 lg:h-screen">
            <div class="p-8 pb-12">
                <div class="flex items-center gap-3 italic font-black text-2xl uppercase tracking-tighter text-white">
                    <i class="fas fa-handshake-angle text-blue-500"></i>
                    <span>COACH <span class="text-blue-500">CONNECT</span></span>
                </div>
            </div>

            <div class="px-6 mb-10">
                <div class="bg-white/5 border border-white/10 rounded-3xl p-5 relative overflow-hidden group">
                    <div class="flex items-center gap-4">
                        <div class="h-12 w-12 rounded-2xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white font-black italic" id="coachee-initials">ST</div>
                        <div>
                            <h4 class="text-sm font-black italic text-white leading-none uppercase" id="coachee-name">Loading...</h4>
                            <a href="#" onclick="viewProfile()" class="text-[8px] font-black text-blue-400 mt-1.5 uppercase tracking-widest opacity-80 hover:opacity-100 transition-opacity">View Profile →</a>
                        </div>
                    </div>
                </div>
            </div>

            <nav class="hidden lg:flex flex-1 px-4 space-y-2 flex-col">
                <span class="px-4 accent-text text-slate-600 block mb-4">Management</span>
                <a href="#" onclick="showDashboardView()" class="nav-item active flex items-center gap-4 px-6 py-4 rounded-2xl group">
                    <i class="fas fa-grid-2 text-sm transition-transform group-hover:scale-110"></i>
                    <span class="text-[11px] font-black uppercase tracking-[0.2em] italic">Dashboard</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 bg-[#f8fafc] p-6 lg:p-10 fade-in lg:overflow-y-auto main-content-height">
            
            <!-- 1. DASHBOARD VIEW -->
            <div id="dashboard-view" class="fade-in">
                <header class="flex justify-between items-center mb-12">
                    <div>
                        <h1 class="text-3xl font-black italic text-slate-900 tracking-tighter uppercase">Coachee Dashboard</h1>
                        <div class="h-1 w-12 bg-blue-600 mt-2"></div>
                    </div>
                </header>

                <!-- Static Widget Row -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-12">
                    <div class="glass-card p-8 group hover:border-blue-500 transition-all cursor-pointer">
                        <span class="accent-text text-blue-600 block mb-4">Support & FAQ</span>
                        <div class="flex items-center justify-between">
                            <p class="text-sm font-black italic text-slate-900 uppercase leading-tight">Data Collection<br>Baseline Guide</p>
                            <i class="fas fa-chevron-right text-slate-200 group-hover:text-blue-600 transition-all"></i>
                        </div>
                    </div>

                    <div class="glass-card p-8 bg-slate-900 border-none md:col-span-2">
                        <span class="accent-text text-blue-400 block mb-2 tracking-[0.2em]">Program Support</span>
                        <div class="flex justify-between items-center">
                            <div>
                                <p class="text-white text-sm font-black italic uppercase leading-tight">Need assistance with your setup?</p>
                                <p class="text-slate-400 text-[10px] uppercase font-bold mt-1">Contact your provincial PQI representative anytime.</p>
                            </div>
                            <button class="bg-blue-600 text-white px-6 py-3 rounded-xl font-black text-[9px] uppercase tracking-widest shadow-lg hover:bg-blue-500 transition">Message Admin</button>
                        </div>
                    </div>
                </div>

                <!-- Match List Container -->
                <section class="glass-card p-8">
                    <div class="flex items-center justify-between mb-8">
                        <h3 class="text-sm font-black italic uppercase tracking-widest text-slate-900">My Projects</h3>
                        <button onclick="newProject()" class="flex items-center gap-2 bg-blue-600 text-white px-4 py-2 rounded-xl font-black text-[9px] uppercase tracking-widest hover:bg-blue-500 transition shadow-sm">
                            <i class="fas fa-plus text-xs"></i> New Project
                        </button>
                    </div>
                    <div class="space-y-4" id="matches-list">
                        <div class="text-center py-8 text-slate-400 text-xs font-bold uppercase tracking-widest">
                            <i class="fas fa-spinner fa-spin mr-2"></i>Loading your projects...
                        </div>
                    </div>
                </section>
            </div>

            <!-- 2. DETAIL VIEW (Hidden by default, triggered via JS) -->
            <div id="detail-view" class="hidden fade-in">
                <!-- Content injected dynamically via JS -->
            </div>

        </main>
    </div>

    <script>
    const urlParams = new URLSearchParams(window.location.search);
    const coacheeName = urlParams.get('name');
    const uid = urlParams.get('uid');

    if (uid) sessionStorage.setItem('uid', uid);
    if (coacheeName) sessionStorage.setItem('name', coacheeName);

    if (coacheeName) {
        document.getElementById('coachee-name').textContent = coacheeName;
        const parts = coacheeName.trim().split(' ');
        const initials = parts.map(p => p[0]).join('').toUpperCase().slice(0, 2);
        const initialsEl = document.getElementById('coachee-initials');
        if (initialsEl) initialsEl.textContent = initials;
    }

    function newProject() {
        const currentUid = uid || sessionStorage.getItem('uid') || '';
        const currentName = coacheeName || sessionStorage.getItem('name') || '';
        window.location.href = 'coachee_setup.html?uid=' + encodeURIComponent(currentUid) + '&name=' + encodeURIComponent(currentName) + '&mode=new';
    }

    function viewProfile() {
        const currentUid = uid || sessionStorage.getItem('uid') || '';
        const currentName = coacheeName || sessionStorage.getItem('name') || '';
        window.location.href = 'coachee_bio.html?uid=' + encodeURIComponent(currentUid) + '&name=' + encodeURIComponent(currentName);
    }
    
    function getCellText(cell) {
        const span = cell.querySelector('span');
        if (span) span.remove();
        return cell.textContent.trim();
    }

    const fieldKeys = [
        'matchId', 'coacheeId', 'coachId', 'status', 'requestDate', 'applicationId',
        'coacheePhone', 'coacheeSite', 'coacheeRole', 'coacheeAbout', 'coacheeEmail',
        'coachEmail', 'coachAbout', 'coachPractice', 'coachQI', 'coachStyle',
        'coachAdditional', 'coachImage', 'coachLink', 'coachFirst', 'coachLast',
        'appProblem', 'appSituation', 'appFunding', 'appPhysician', 'appTitle',
        'appRegion', 'appStartDate', 'appEndDate', 'appCoachLooking', 'appSupport',
        'appQITraining', 'appQILevel', 'appAvailability', 'appFrequency', 'appMethod',
        'appAdditional', 'appReferral', 'coacheeFirst', 'coacheeLast'
    ];

    window.cachedMatches = []; 

    function loadMatches() {
        const currentUid = uid || sessionStorage.getItem('uid');
        if (!currentUid) { showNoMatches(); return; }
        const container = document.getElementById('caspio-matches');
        const s = document.createElement('script');
        s.type = 'text/javascript';
        s.src = 'https://c0abr823.caspio.com/dp/1c9f5000e03ca6baa40b44d682da/emb?uid=' + encodeURIComponent(currentUid);
        container.appendChild(s);
        waitForMatches(0);
    }

    function waitForMatches(tries) {
        const table = document.querySelector('#caspio-matches table');
        if (table) {
            parseMatches(table);
        } else if (tries < 40) {
            setTimeout(() => waitForMatches(tries + 1), 300);
        } else {
            showNoMatches();
        }
    }

    function parseMatches(table) {
        const rows = table.querySelectorAll('tr');
        const matches = [];

        rows.forEach(row => {
            const cells = row.querySelectorAll('td');
            if (cells.length >= 5) { 
                const matchObj = {};
                fieldKeys.forEach((key, index) => {
                    if (cells[index]) {
                        if (key === 'coachImage') {
                            const imgEl = cells[index].querySelector('img');
                            matchObj[key] = imgEl ? imgEl.src : '';
                        } else {
                            matchObj[key] = getCellText(cells[index]);
                        }
                    } else {
                        matchObj[key] = '';
                    }
                });
                if (matchObj.matchId) {
                    matches.push(matchObj);
                }
            }
        });

        window.cachedMatches = matches; 
        renderMatchesList(matches);
    }

    function renderMatchesList(matches) {
        const list = document.getElementById('matches-list');
        if (matches.length === 0) { showNoMatches(); return; }

        list.innerHTML = matches.map(m => {
            const isPending = m.status === 'Pending';
            const coachFullName = (m.coachFirst || m.coachLast) ? `Dr. ${m.coachFirst} ${m.coachLast}` : 'Assigning Coach...';
            
            const submissionDate = m.requestDate ? m.requestDate.split(' ')[0] : 'N/A';
            
            const statusBadge = isPending 
                ? '<span class="text-[8px] font-black text-amber-500 border border-amber-200 bg-amber-50 px-2.5 py-1 rounded-full uppercase">Pending Review</span>'
                : '<span class="text-[8px] font-black text-emerald-500 border border-emerald-200 bg-emerald-50 px-2.5 py-1 rounded-full uppercase">Active Setup</span>';

            return `
                <div onclick="showProjectDetail('${m.matchId}')"
                    class="flex items-center justify-between p-6 rounded-[32px] bg-slate-50/50 border border-transparent hover:border-slate-200 hover:bg-white transition-all duration-300 cursor-pointer group">
                    <div class="flex items-center gap-6">
                        <div class="w-14 h-14 rounded-2xl bg-white shadow-sm flex items-center justify-center font-black italic text-slate-400 group-hover:text-blue-600 transition-colors">
                            ${(m.appTitle || 'P').slice(0,2).toUpperCase()}
                        </div>
                        <div>
                            <h4 class="text-md font-black italic text-slate-900 uppercase tracking-tight">${m.appTitle || 'Untitled Project'}</h4>
                            <div class="flex items-center gap-3 mt-1.5 flex-wrap">
                                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-tight italic">Submission Date: ${submissionDate}</span>
                                <span class="text-slate-300 text-xs">•</span>
                                <span class="text-[9px] font-bold text-slate-500 uppercase tracking-tight italic">Coach: ${coachFullName}</span>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        ${statusBadge}
                        <i class="fas fa-chevron-right text-slate-200 group-hover:text-blue-600 transition-all"></i>
                    </div>
                </div>`;
        }).join('');
    }

    function showNoMatches() {
        document.getElementById('matches-list').innerHTML = '<p class="text-center py-8 text-slate-400 text-xs font-bold uppercase tracking-widest">No active matches yet.</p>';
    }

    function showProjectDetail(matchId) {
        const project = window.cachedMatches.find(m => m.matchId === matchId);
        if (!project) return;

        document.getElementById('dashboard-view').classList.add('hidden');
        const detailContainer = document.getElementById('detail-view');
        detailContainer.classList.remove('hidden');

        const isPending = project.status === 'Pending';
        const coachInitials = (((project.coachFirst||'')[0]||'') + ((project.coachLast||'')[0]||'')).toUpperCase();
        const coachImageHtml = project.coachImage
            ? `<img src="${project.coachImage}" class="avatar-img w-16 h-16 rounded-2xl object-cover" onerror="this.outerHTML='<div class=\\'avatar-placeholder w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white font-black italic text-md\\'>${coachInitials}</div>'">`
            : `<div class="avatar-placeholder w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white font-black italic text-md">${coachInitials}</div>`;

        const meetingUrl = 'meeting.html?match_id=' + encodeURIComponent(project.matchId)
            + '&coachee_uid=' + encodeURIComponent(project.coacheeId)
            + '&coach_uid=' + encodeURIComponent(project.coachId)
            + '&name=' + encodeURIComponent(coacheeName || sessionStorage.getItem('name') || '')
            + '&coachee_name=' + encodeURIComponent(project.coacheeFirst + ' ' + project.coacheeLast)
            + '&project_title=' + encodeURIComponent(project.appTitle || '')
            + '&problem=' + encodeURIComponent(project.appProblem || '')
            + '&about=' + encodeURIComponent(project.coacheeAbout || '');

        detailContainer.innerHTML = `
            <div class="fade-in">
                <!-- Back Header -->
                <div class="flex flex-col lg:flex-row justify-between lg:items-center mb-10 gap-4">
                    <button onclick="showDashboardView()" class="w-fit flex items-center gap-2 text-[10px] font-black text-slate-400 uppercase tracking-widest hover:text-blue-600 transition">
                        <i class="fas fa-arrow-left"></i> Dashboard
                    </button>
                    <div>
                        <span class="accent-text text-blue-600 tracking-widest block lg:text-right">Project Workspace</span>
                        <h1 class="text-2xl font-black italic text-slate-900 uppercase leading-none mt-1 lg:text-right">${project.appTitle || 'Workspace'}</h1>
                    </div>
                </div>

                <!-- 2 Column Master Grid -->
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                    
                    <!-- LEFT COLUMN: Application Details (8 Cols) -->
                    <div class="lg:col-span-8 space-y-6">
                        <!-- Card: Baseline Goals -->
                        <div class="glass-card p-8">
                            <span class="accent-text text-blue-600 tracking-widest block mb-4">Project Context & Problems</span>
                            
                            <div class="space-y-6">
                                <div>
                                    <h4 class="text-[10px] font-black text-slate-400 uppercase italic mb-2 tracking-tighter">Primary Problem Statement</h4>
                                    <p class="text-sm text-slate-700 font-medium leading-relaxed border-l-4 border-blue-600 pl-4 bg-slate-50 py-3 pr-4 rounded-r-xl italic">
                                        "${project.appProblem || 'No problem statement provided.'}"
                                    </p>
                                </div>
                                <div>
                                    <h4 class="text-[10px] font-black text-slate-400 uppercase italic mb-2 tracking-tighter">Current Situation</h4>
                                    <p class="text-sm text-slate-700 leading-relaxed font-medium bg-slate-50/50 p-4 rounded-2xl border border-slate-100">
                                        ${project.appSituation || 'No situation description provided.'}
                                    </p>
                                </div>
                                <div>
                                    <h4 class="text-[10px] font-black text-slate-400 uppercase italic mb-2 tracking-tighter">Specific Coaching Support Needed</h4>
                                    <p class="text-sm text-slate-700 leading-relaxed font-medium bg-slate-50/50 p-4 rounded-2xl border border-slate-100">
                                        ${project.appSupport || 'No details provided.'}
                                    </p>
                                </div>
                            </div>
                        </div>

                        <!-- Card: Complete Application Metadata Grid -->
                        <div class="glass-card p-8">
                            <span class="accent-text text-slate-400 tracking-widest block mb-6">Application Specifications</span>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="p-4 bg-slate-50 border border-slate-100 rounded-2xl">
                                    <p class="text-[9px] font-black text-slate-400 uppercase leading-none mb-1.5">Region / Location</p>
                                    <p class="text-xs font-black text-slate-900 uppercase italic">${project.appRegion || 'N/A'}</p>
                                </div>
                                <div class="p-4 bg-slate-50 border border-slate-100 rounded-2xl">
                                    <p class="text-[9px] font-black text-slate-400 uppercase leading-none mb-1.5">Physician Lead</p>
                                    <p class="text-xs font-black text-slate-900 uppercase italic">${project.appPhysician || 'None Specified'}</p>
                                </div>
                                <div class="p-4 bg-slate-50 border border-slate-100 rounded-2xl">
                                    <p class="text-[9px] font-black text-slate-400 uppercase leading-none mb-1.5">QI Level & Training</p>
                                    <p class="text-xs font-black text-slate-900 uppercase italic">${project.appQILevel || 'No Prior Level'} (${project.appQITraining || 'No formal training'})</p>
                                </div>
                                <div class="p-4 bg-slate-50 border border-slate-100 rounded-2xl">
                                    <p class="text-[9px] font-black text-slate-400 uppercase leading-none mb-1.5">Project Timeline</p>
                                    <p class="text-xs font-black text-slate-900 uppercase italic">${project.appStartDate || 'Start Date'} ~ ${project.appEndDate || 'End Date'}</p>
                                </div>
                                <div class="p-4 bg-slate-50 border border-slate-100 rounded-2xl">
                                    <p class="text-[9px] font-black text-slate-400 uppercase leading-none mb-1.5">Meeting Methods & Frequency</p>
                                    <p class="text-xs font-black text-slate-900 uppercase italic">${project.appFrequency || 'Flexible'} via ${project.appMethod || 'Virtual'}</p>
                                </div>
                                <div class="p-4 bg-slate-50 border border-slate-100 rounded-2xl">
                                    <p class="text-[9px] font-black text-slate-400 uppercase leading-none mb-1.5">Funding Details</p>
                                    <p class="text-xs font-black text-slate-900 uppercase italic">${project.appFunding || 'No funding details'}</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- RIGHT COLUMN: Coach Card (4 Cols) -->
                    <div class="lg:col-span-4 space-y-6">
                        <div class="glass-card p-6 border-2 ${isPending ? 'border-amber-300' : 'border-blue-600'}">
                            <div class="flex justify-between items-center mb-6">
                                <span class="accent-text text-slate-400 tracking-widest block">Assigned Coach</span>
                                ${isPending 
                                    ? '<span class="text-[8px] font-black text-amber-500 bg-amber-50 px-2 py-0.5 rounded uppercase border border-amber-200">Pending Approval</span>'
                                    : '<span class="text-[8px] font-black text-emerald-500 bg-emerald-50 px-2 py-0.5 rounded uppercase border border-emerald-200">Active</span>'
                                }
                            </div>

                            <!-- Coach Brief Header -->
                            <div class="flex items-center gap-4 mb-6">
                                ${coachImageHtml}
                                <div>
                                    <h3 class="text-sm font-black italic text-slate-900 uppercase">${project.coachFirst ? `Dr. ${project.coachFirst} ${project.coachLast}` : 'Assigning Coach...'}</h3>
                                    <p class="text-[9px] font-bold text-slate-400 uppercase mt-1 tracking-tight">${project.coachPractice || 'Clinical Practice'}</p>
                                </div>
                            </div>

                            <!-- Meeting Button (Logic depending on status) -->
                            ${isPending 
                                ? `<div class="bg-amber-50 border border-amber-100 rounded-2xl p-4 text-center mb-4">
                                       <p class="text-[10px] font-black text-amber-600 uppercase tracking-wide leading-relaxed">Waiting for Coach acceptance.<br>Review timeline up to 5 business days.</p>
                                   </div>`
                                : `<button onclick="window.location.href='${meetingUrl}'" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-lg hover:bg-blue-500 transition mb-4">
                                       <i class="fas fa-video mr-1.5"></i> Join Meeting Workspace
                                   </button>`
                            }

                            <!-- Accordion: Full Coach Profile -->
                            ${(project.coachFirst || project.coachLast) ? `
                                <div class="border-t border-slate-100 pt-4 mt-4">
                                    <button onclick="toggleCoachProfileAccordion()" class="w-full flex justify-between items-center text-slate-600 hover:text-slate-900 transition">
                                        <span class="text-[9px] font-black uppercase tracking-widest">About Dr. ${project.coachLast}</span>
                                        <i id="accordion-icon" class="fas fa-chevron-down text-xs transition-transform"></i>
                                    </button>
                                    
                                    <div id="coach-profile-details" class="hidden mt-4 space-y-4">
                                        <div>
                                            <span class="text-[8px] font-black text-slate-400 uppercase tracking-tighter block mb-1">Coaching Bio</span>
                                            <p class="text-[11px] text-slate-600 font-medium leading-relaxed italic">"${project.coachAbout || 'No custom bio provided.'}"</p>
                                        </div>
                                        <div>
                                            <span class="text-[8px] font-black text-slate-400 uppercase tracking-tighter block mb-1">QI Strengths</span>
                                            <p class="text-[11px] text-slate-600 font-medium leading-relaxed">${project.coachQI || 'N/A'}</p>
                                        </div>
                                        <div>
                                            <span class="text-[8px] font-black text-slate-400 uppercase tracking-tighter block mb-1">Coaching Style</span>
                                            <p class="text-[11px] text-slate-600 font-medium leading-relaxed">${project.coachStyle || 'N/A'}</p>
                                        </div>
                                        ${project.coachLink ? `
                                        <div>
                                            <span class="text-[8px] font-black text-slate-400 uppercase tracking-tighter block mb-1">Booking Link</span>
                                            <a href="${project.coachLink}" target="_blank" class="text-[11px] text-blue-600 font-black hover:underline uppercase block">${project.coachLink}</a>
                                        </div>` : ''}
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    </div>

                </div>
            </div>
        `;
    }

    function toggleCoachProfileAccordion() {
        const detailBlock = document.getElementById('coach-profile-details');
        const icon = document.getElementById('accordion-icon');
        if (detailBlock.classList.contains('hidden')) {
            detailBlock.classList.remove('hidden');
            icon.classList.add('rotate-180');
        } else {
            detailBlock.classList.add('hidden');
            icon.classList.remove('rotate-180');
        }
    }

    function showDashboardView() {
        document.getElementById('detail-view').classList.add('hidden');
        document.getElementById('dashboard-view').classList.remove('hidden');
        renderMatchesList(window.cachedMatches);
    }

    loadMatches();
    </script>
</body>
</html>
