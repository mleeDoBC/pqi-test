<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PQI Connect | Invoice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 24px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); }
        .accent-text { font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.6rem; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .form-input {
            width: 100%;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            outline: none;
            transition: all 0.2s;
            color: #1e293b;
            background: white;
        }
        .form-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        .form-input::placeholder { color: #94a3b8; font-weight: 400; }

        .line-row { 
            display: grid; 
            grid-template-columns: 1fr 100px 28px; 
            gap: 10px; 
            align-items: center;
        }

        .remove-btn {
            width: 28px; height: 28px;
            border-radius: 8px;
            border: none;
            background: #f1f5f9;
            color: #94a3b8;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px;
            transition: all 0.15s;
            flex-shrink: 0;
        }
        .remove-btn:hover { background: #fee2e2; color: #ef4444; }

        .add-row-btn {
            border: 1.5px dashed #e2e8f0;
            border-radius: 12px;
            padding: 10px;
            width: 100%;
            background: transparent;
            color: #94a3b8;
            font-size: 11px;
            font-weight: 800;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.2s;
        }
        .add-row-btn:hover { border-color: #3b82f6; color: #3b82f6; background: #eff6ff; }

        select.form-input { cursor: pointer; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div class="max-w-2xl mx-auto px-4 py-10 fade-in">

        <!-- Header -->
        <div class="mb-8 flex items-center justify-between">
            <button onclick="goBack()" class="flex items-center gap-2 text-[10px] font-black text-slate-400 uppercase tracking-widest hover:text-blue-600 transition">
                <i class="fas fa-arrow-left"></i> Back
            </button>
            <div class="flex items-center gap-3 italic font-black text-lg uppercase tracking-tighter text-slate-800">
                <i class="fas fa-handshake-angle text-blue-500"></i>
                PQI <span class="text-blue-500">CONNECT</span>
            </div>
        </div>

        <!-- Card -->
        <section class="glass-card p-8 lg:p-10">

            <!-- Title -->
            <div class="mb-10 flex justify-between items-start">
                <div>
                    <span class="accent-text text-blue-600 block mb-2">Billing Submission</span>
                    <h2 class="text-2xl font-black italic text-slate-900 uppercase leading-none">Create Invoice</h2>
                </div>
                <div class="text-right">
                    <p class="text-[9px] font-black text-slate-300 uppercase tracking-widest">Invoice #</p>
                    <p class="text-sm font-black italic text-slate-400" id="invoice-number">—</p>
                </div>
            </div>

            <div class="space-y-8">

                <!-- Select Project -->
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block tracking-widest">Select Project</label>
                    <select class="form-input" id="project-select" onchange="updateProject()">
                        <option value="">— Choose a project —</option>
                        <option value="Dr. Mike Trouse — Reducing ER Wait Times">Dr. Mike Trouse — Reducing ER Wait Times</option>
                        <option value="Dr. Sarah Chen — Diabetes Care Protocol">Dr. Sarah Chen — Diabetes Care Protocol</option>
                        <option value="Dr. James Park — Post-Op Recovery Flow">Dr. James Park — Post-Op Recovery Flow</option>
                    </select>
                </div>

                <!-- Line Items -->
                <div>
                    <div class="flex items-center justify-between mb-3">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Line Items</label>
                        <div class="grid text-[9px] font-black text-slate-300 uppercase tracking-widest" style="grid-template-columns: 1fr 100px 28px; gap: 10px; width: calc(100% - 0px);">
                            <span>Description</span>
                            <span>Hours</span>
                            <span></span>
                        </div>
                    </div>

                    <div class="space-y-2" id="line-items">
                        <!-- rows injected here -->
                    </div>

                    <button class="add-row-btn mt-3" onclick="addRow()">
                        <i class="fas fa-plus mr-2"></i> Add Line Item
                    </button>
                </div>

                <!-- Summary -->
                <div class="pt-6 border-t border-slate-100">
                    <div class="bg-slate-50 rounded-2xl p-6 space-y-3">
                        <div class="flex justify-between items-center">
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Total Hours</span>
                            <span class="text-sm font-black italic text-slate-700" id="total-hours">0.0 hrs</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Rate per Hour</span>
                            <span class="text-sm font-black italic text-slate-700">$176.00</span>
                        </div>
                        <div class="border-t border-slate-200 pt-3 flex justify-between items-center">
                            <span class="text-sm font-black italic text-slate-400 uppercase">Total Amount</span>
                            <span class="text-3xl font-black italic text-blue-600" id="total-amount">$0.00</span>
                        </div>
                    </div>
                </div>

                <!-- Submit -->
                <button onclick="submitInvoice()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-[11px] uppercase tracking-[0.3em] shadow-xl hover:bg-blue-600 transition">
                    Submit Invoice
                </button>
            </div>
        </section>
    </div>

<script>
    const RATE = 176;
    let rowCount = 0;

    // Generate invoice number
    document.getElementById('invoice-number').textContent = 'INV-' + Date.now().toString().slice(-6);

    function goBack() {
        const uid = sessionStorage.getItem('uid') || '';
        const name = sessionStorage.getItem('name') || '';
        window.location.href = 'coach.html?uid=' + encodeURIComponent(uid) + '&name=' + encodeURIComponent(name);
    }

    function addRow(desc = '', hrs = '') {
        rowCount++;
        const id = rowCount;
        const row = document.createElement('div');
        row.className = 'line-row';
        row.id = 'row-' + id;
        row.innerHTML = `
            <input type="text" class="form-input" placeholder="e.g. Initial assessment session" 
                value="${desc}" oninput="recalculate()">
            <input type="number" class="form-input" placeholder="0.0" min="0" step="0.5"
                value="${hrs}" oninput="recalculate()" style="text-align:right;">
            <button class="remove-btn" onclick="removeRow(${id})">
                <i class="fas fa-times"></i>
            </button>
        `;
        document.getElementById('line-items').appendChild(row);
        recalculate();
    }

    function removeRow(id) {
        const row = document.getElementById('row-' + id);
        if (row) row.remove();
        recalculate();
    }

    function recalculate() {
        const rows = document.querySelectorAll('#line-items .line-row');
        let total = 0;
        rows.forEach(row => {
            const hrs = parseFloat(row.querySelectorAll('input')[1].value) || 0;
            total += hrs;
        });
        document.getElementById('total-hours').textContent = total.toFixed(1) + ' hrs';
        document.getElementById('total-amount').textContent = '$' + (total * RATE).toLocaleString('en-CA', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function updateProject() {
        // Could load unbilled hours from Caspio later
    }

    function submitInvoice() {
        const project = document.getElementById('project-select').value;
        if (!project) {
            alert('Please select a project.');
            return;
        }
        const rows = document.querySelectorAll('#line-items .line-row');
        if (rows.length === 0) {
            alert('Please add at least one line item.');
            return;
        }
        // TODO: Caspio insert
        alert('Invoice submitted successfully!');
        goBack();
    }

    // Start with one empty row
    addRow();
</script>

</body>
</html>
