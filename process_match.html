<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing Match...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #caspio-hidden-form { position: absolute; left: -9999px; top: -9999px; }
    </style>
</head>
<body>

    <div class="text-center">
        <i class="fas fa-spinner fa-spin text-4xl text-indigo-500 mb-4"></i>
        <h2 class="text-xl font-bold text-slate-800">Sending your application...</h2>
        <p class="text-slate-500 text-sm mt-2">Just a moment please.</p>
    </div>

    <div id="caspio-hidden-form">
        <script type="text/javascript" src="https://c0abr823.caspio.com/dp/1c9f5000bc9dc3af84cb4934a809/emb"></script>
    </div>

    <script>
        function autoSubmitForm(tries) {
            const submitBtn = document.querySelector('.cbSubmitButton');
            
            if (submitBtn) {
                console.log("Application sent!");
                submitBtn.click();
                
                const params = new URLSearchParams(window.location.search);
                const uid = params.get('uid') || '';
                const name = params.get('name') || '';

                setTimeout(() => {
                    window.location.href = 'coachee.html?uid=' + encodeURIComponent(uid) + '&name=' + encodeURIComponent(name);
                }, 1500);
            } else if (tries < 50) {
                setTimeout(() => autoSubmitForm(tries + 1), 200);
            }
        }
        autoSubmitForm(0);
    </script>
</body>
</html>
